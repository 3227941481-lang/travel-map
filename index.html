<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>acer 的旅行足迹</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', 'Noto Serif SC', serif;
      background: #EDE9E6;
      color: #4A4543;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      padding: 50px 20px 24px;
      background: #E3DED9;
      border-bottom: 1px solid #D5CFCA;
    }
    .header h1 {
      font-size: 2.4rem; font-weight: 400;
      letter-spacing: 6px; color: #5B5653;
      margin-bottom: 6px;
    }
    .header .subtitle {
      font-size: 0.9rem; color: #8B827B;
      letter-spacing: 3px; font-style: italic;
    }
    .stats-bar {
      display: flex; justify-content: center; gap: 40px;
      padding: 18px 20px;
      background: #E8E3DF;
      border-bottom: 1px solid #D5CFCA;
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-item .num { font-size: 1.6rem; font-weight: 400; color: #5B5653; letter-spacing: 1px; }
    .stat-item .label { font-size: 0.75rem; color: #9B9088; letter-spacing: 2px; margin-top: 2px; }
    .action-bar {
      display: flex; justify-content: center; gap: 12px;
      padding: 14px 20px;
      background: #E8E3DF;
      border-bottom: 1px solid #D5CFCA;
      flex-wrap: wrap;
    }
    .btn {
      font-family: inherit; font-size: 0.8rem;
      letter-spacing: 1px; cursor: pointer;
      padding: 6px 18px; border-radius: 20px;
      border: 1px solid #C4BDB6;
      background: #F2EFEC; color: #5B5653;
      transition: all 0.2s;
    }
    .btn:hover { background: #ECE8E4; border-color: #A69D96; }
    .btn.active { background: #D5CFCA; border-color: #8B827B; }
    .btn-primary { background: #8B827B; color: #F2EFEC; border-color: #8B827B; }
    .btn-primary:hover { background: #7A726C; }
    .btn-sm { font-size: 0.7rem; padding: 4px 12px; }

    .map-wrapper { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
    #map { height: 480px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #D5CFCA; }

    .cards-section { max-width: 1100px; margin: 30px auto 60px; padding: 0 20px; }
    .cards-section h2 {
      font-size: 1.1rem; font-weight: 400; letter-spacing: 3px;
      color: #7A726C; margin-bottom: 18px;
      border-bottom: 1px solid #D5CFCA; padding-bottom: 10px;
    }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

    .city-card {
      background: #F2EFEC; border: 1px solid #DCD6D1;
      border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s;
      position: relative;
    }
    .city-card:hover { background: #ECE8E4; border-color: #C4BDB6; transform: translateY(-2px); }
    .city-card .city-name { font-size: 1.05rem; color: #5B5653; letter-spacing: 2px; margin-bottom: 3px; }
    .city-card .city-en { font-size: 0.65rem; color: #A69D96; letter-spacing: 1px; text-transform: uppercase; font-style: italic; }
    .city-card .city-tag {
      display: inline-block; margin-top: 6px; font-size: 0.7rem;
      color: #8B827B; background: #E3DED9; padding: 2px 10px; border-radius: 20px;
    }
    .city-card .city-note { margin-top: 6px; font-size: 0.78rem; color: #6B6560; line-height: 1.5; }

    .photo-strip {
      display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
    }
    .photo-strip .thumb {
      width: 52px; height: 52px; border-radius: 6px;
      object-fit: cover; border: 1px solid #DCD6D1;
      cursor: pointer; transition: 0.15s;
    }
    .photo-strip .thumb:hover { opacity: 0.8; transform: scale(1.05); }
    .photo-strip .add-photo-btn {
      width: 52px; height: 52px; border-radius: 6px;
      border: 1px dashed #C4BDB6; background: #E8E3DF;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #9B9088; cursor: pointer; transition: 0.15s;
    }
    .photo-strip .add-photo-btn:hover { background: #DCD6D1; }

    .edit-mode .city-card { cursor: default; }
    .city-card .edit-btn { display: none; }
    .edit-mode .city-card .edit-btn {
      display: inline-block; position: absolute; top: 8px; right: 10px;
      font-size: 0.7rem; color: #A69D96; cursor: pointer; background: none; border: none;
      font-family: inherit; letter-spacing: 1px;
    }
    .edit-mode .city-card .edit-btn:hover { color: #5B5653; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.3);
      z-index: 9999; justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #F2EFEC; border: 1px solid #DCD6D1;
      border-radius: 12px; padding: 28px 30px;
      width: 420px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }
    .modal-box h3 { font-weight: 400; letter-spacing: 2px; color: #5B5653; margin-bottom: 16px; }
    .modal-box label {
      display: block; font-size: 0.75rem; color: #8B827B;
      letter-spacing: 1px; margin: 10px 0 4px;
    }
    .modal-box input, .modal-box textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #DCD6D1;
      border-radius: 6px; background: #F8F6F4; color: #4A4543;
      font-family: inherit; font-size: 0.85rem;
    }
    .modal-box textarea { resize: vertical; min-height: 60px; }

    .photo-upload-area {
      border: 1px dashed #C4BDB6; border-radius: 8px;
      padding: 14px; margin-top: 10px; background: #F8F6F4;
    }
    .photo-upload-area input[type="file"] { display: none; }
    .photo-preview-grid {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
    }
    .photo-preview-item {
      position: relative; width: 72px; height: 72px;
    }
    .photo-preview-item img {
      width: 100%; height: 100%; border-radius: 6px;
      object-fit: cover; border: 1px solid #DCD6D1;
    }
    .photo-preview-item .del-photo {
      position: absolute; top: -4px; right: -4px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #9B6B6B; color: #fff; border: none;
      font-size: 0.6rem; cursor: pointer; line-height: 18px; text-align: center;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

    .leaflet-popup-content-wrapper {
      border-radius: 10px !important; background: #F2EFEC !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08) !important;
      border: 1px solid #DCD6D1 !important;
    }
    .leaflet-popup-content {
      font-family: 'Georgia', 'Noto Serif SC', serif;
      color: #4A4543; font-size: 0.85rem;
      margin: 12px 14px !important; line-height: 1.6;
    }
    .leaflet-popup-content .pop-title { font-size: 1.05rem; letter-spacing: 2px; color: #5B5653; }
    .leaflet-popup-content .pop-sub { font-size: 0.65rem; color: #A69D96; font-style: italic; }
    .leaflet-popup-content .pop-note { margin-top: 6px; font-size: 0.8rem; color: #6B6560; }
    .leaflet-popup-content .pop-photo {
      width: 100%; max-height: 160px; object-fit: cover;
      border-radius: 6px; margin-top: 8px;
      border: 1px solid #DCD6D1; cursor: pointer;
    }
    .leaflet-popup-tip { background: #F2EFEC !important; border: 1px solid #DCD6D1 !important; }

    .lightbox {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.8);
      z-index: 99999; justify-content: center; align-items: center;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 90vh; border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }
    .lightbox .close-lightbox {
      position: fixed; top: 20px; right: 30px;
      font-size: 2rem; color: #fff; cursor: pointer;
      background: none; border: none; font-family: inherit;
    }

    .add-city-form {
      display: none; margin-top: 20px;
      padding: 20px; background: #E8E3DF;
      border-radius: 10px; border: 1px dashed #C4BDB6;
    }
    .add-city-form.show { display: block; }
    .add-city-form h3 { font-weight: 400; letter-spacing: 2px; color: #5B5653; margin-bottom: 12px; }
    .add-city-form .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .add-city-form .form-row input, .add-city-form .form-row textarea {
      flex: 1; min-width: 120px; padding: 8px 10px;
      border: 1px solid #DCD6D1; border-radius: 6px;
      background: #F8F6F4; color: #4A4543; font-family: inherit; font-size: 0.85rem;
    }
    .add-city-form .form-row textarea { min-height: 50px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>✧ 旅行足迹</h1>
    <div class="subtitle">acer 的脚步</div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="action-bar">
    <button class="btn" id="btnEdit">✎ 编辑</button>
    <button class="btn btn-primary" id="btnPoster">🖼 生成海报</button>
  </div>
  <div class="map-wrapper"><div id="map"></div></div>
  <div class="cards-section">
    <h2>· 到过的地方</h2>
    <div class="cards-grid" id="cityCards"></div>
    <div class="add-city-form" id="addForm">
      <h3>+ 添加城市</h3>
      <div class="form-row">
        <input id="inpName" placeholder="城市名 (如 北京)">
        <input id="inpNameEn" placeholder="英文名 (如 Beijing)">
        <input id="inpTag" placeholder="标签 (如 首都·古韵)">
      </div>
      <div class="form-row">
        <input id="inpLat" placeholder="纬度 (如 39.9)">
        <input id="inpLng" placeholder="经度 (如 116.4)">
      </div>
      <div class="form-row">
        <textarea id="inpNote" placeholder="你的印象笔记..."></textarea>
      </div>
      <button class="btn btn-primary" id="btnAddCity">保存城市</button>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h3 id="modalTitle">编辑城市</h3>
      <label>城市名</label><input id="modalName">
      <label>英文名</label><input id="modalNameEn">
      <label>标签</label><input id="modalTag">
      <label>笔记</label><textarea id="modalNote"></textarea>
      <label>照片</label>
      <div class="photo-upload-area">
        <button class="btn btn-sm btn-primary" id="btnUploadPhoto">+ 选择照片</button>
        <div class="photo-preview-grid" id="photoPreviewGrid"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalSave">保存</button>
        <button class="btn" id="modalDelete" style="color:#9B6B6B;">删除</button>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="close-lightbox" id="closeLightbox">✕</button>
    <img id="lightboxImg" src="">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const DEFAULT_CITIES = [
      { name: '上海', nameEn: 'Shanghai', lat: 31.23, lng: 121.47, tag: '都会 · 烟火', note: '外滩的风，弄堂里的猫，繁华与日常交织。', photos: [] },
      { name: '南京', nameEn: 'Nanjing', lat: 32.06, lng: 118.80, tag: '古都 · 梧桐', note: '明孝陵的石象路，秋天的梧桐大道。', photos: [] },
      { name: '苏州', nameEn: 'Suzhou', lat: 31.30, lng: 120.59, tag: '园林 · 水乡', note: '拙政园的借景，平江路的评弹声。', photos: [] },
      { name: '青岛', nameEn: 'Qingdao', lat: 36.07, lng: 120.38, tag: '海滨 · 红瓦', note: '栈桥的海鸥，八大关的红瓦绿树。', photos: [] },
      { name: '广西北海', nameEn: 'Beihai, Guangxi', lat: 21.48, lng: 109.12, tag: '银滩 · 暖风', note: '涠洲岛的日落，老街的糖水铺。', photos: [] },
    ];
    const PROVINCE_MAP = { '上海': '上海', '南京': '江苏', '苏州': '江苏', '青岛': '山东', '北京': '北京', '成都': '四川', '杭州': '浙江', '广西北海': '广西' };

    let cities = [], editMode = false, editingIdx = -1, map = null, markers = [], editingPhotos = [];

    function loadCities() {
      const saved = localStorage.getItem('travelCities');
      if (saved) { try { cities = JSON.parse(saved); return; } catch(e) {} }
      cities = JSON.parse(JSON.stringify(DEFAULT_CITIES));
    }
    function saveCities() { localStorage.setItem('travelCities', JSON.stringify(cities)); }

    function renderStats() {
      const total = cities.length;
      const provinces = new Set(cities.map(c => PROVINCE_MAP[c.name] || c.name));
      let north = cities[0], south = cities[0];
      cities.forEach(c => { if (c.lat > north.lat) north = c; if (c.lat < south.lat) south = c; });
      const totalPhotos = cities.reduce((s, c) => s + (c.photos ? c.photos.length : 0), 0);
      document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="num">${total}</div><div class="label">城市</div></div>
        <div class="stat-item"><div class="num">${provinces.size}</div><div class="label">省 / 直辖市</div></div>
        <div class="stat-item"><div class="num">${totalPhotos}</div><div class="label">照片</div></div>
        <div class="stat-item"><div class="num">${north.name}</div><div class="label">最北</div></div>
        <div class="stat-item"><div class="num">${south.name}</div><div class="label">最南</div></div>`;
    }

    function initMap() {
      map = L.map('map', { center: [30.5, 116], zoom: 6, zoomControl: true, attributionControl: false });
      L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', { maxZoom: 18, subdomains: ['1','2','3','4'] }).addTo(map);
    }

    const pinIcon = L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;border-radius:50%;background:#9B8E86;border:3px solid #D5CFCA;box-shadow:0 2px 6px rgba(0,0,0,0.15);"></div>',
      iconSize: [16,16], iconAnchor: [8,8], popupAnchor: [0,-10],
    });

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('show');
    }
    document.getElementById('closeLightbox').addEventListener('click', () => { document.getElementById('lightbox').classList.remove('show'); });
    document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target === e.currentTarget) document.getElementById('lightbox').classList.remove('show'); });

    function renderAll() {
      markers.forEach(m => map.removeLayer(m)); markers = [];
      cities.forEach(c => {
        const popupHtml = `
          <div class="pop-title">${c.name}</div>
          <div class="pop-sub">${c.nameEn}</div>
          <div class="pop-note">${c.note}</div>
          ${c.photos && c.photos.length > 0 ? `<img class="pop-photo" src="${c.photos[0]}" onclick="openLightbox('${c.photos[0]}')">` : ''}`;
        const m = L.marker([c.lat, c.lng], { icon: pinIcon }).addTo(map);
        m.bindPopup(popupHtml); markers.push(m);
      });
      const container = document.getElementById('cityCards'); container.innerHTML = '';
      cities.forEach((c, i) => {
        let photosHtml = '<div class="photo-strip">';
        if (c.photos) { c.photos.forEach(p => { photosHtml += `<img class="thumb" src="${p}" onclick="event.stopPropagation();openLightbox('${p}')">`; }); }
        if (editMode) { photosHtml += `<div class="add-photo-btn" data-idx="${i}" title="添加照片">+</div>`; }
        photosHtml += '</div>';
        const card = document.createElement('div'); card.className = 'city-card';
        card.innerHTML = `<button class="edit-btn" data-idx="${i}">✎ 编辑</button><div class="city-name">${c.name}</div><div class="city-en">${c.nameEn}</div><div class="city-tag">${c.tag}</div><div class="city-note">${c.note}</div>${photosHtml}`;
        card.addEventListener('click', (e) => {
          if (e.target.closest('.edit-btn') || e.target.closest('.add-photo-btn') || e.target.closest('.thumb')) return;
          map.flyTo([c.lat, c.lng], 11, { duration: 1 });
          setTimeout(() => { markers[i] && markers[i].openPopup(); }, 1100);
        });
        card.querySelector('.edit-btn').addEventListener('click', (e) => { e.stopPropagation(); openEditModal(i); });
        const addBtn = card.querySelector('.add-photo-btn');
        if (addBtn) { addBtn.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(i); setTimeout(() => document.getElementById('btnUploadPhoto').click(), 300); }); }
        container.appendChild(card);
      });
      renderStats(); updateEditUI();
    }

    function updateEditUI() {
      document.body.classList.toggle('edit-mode', editMode);
      document.getElementById('btnEdit').classList.toggle('active', editMode);
      document.getElementById('addForm').classList.toggle('show', editMode);
      document.getElementById('btnEdit').textContent = editMode ? '✎ 完成编辑' : '✎ 编辑';
    }
    document.getElementById('btnEdit').addEventListener('click', () => { editMode = !editMode; renderAll(); });

    function openEditModal(idx) {
      editingIdx = idx; const c = cities[idx];
      document.getElementById('modalTitle').textContent = `编辑 - ${c.name}`;
      document.getElementById('modalName').value = c.name; document.getElementById('modalNameEn').value = c.nameEn;
      document.getElementById('modalTag').value = c.tag; document.getElementById('modalNote').value = c.note;
      editingPhotos = c.photos ? [...c.photos] : []; renderPhotoPreview();
      document.getElementById('editModal').classList.add('show');
    }
    function renderPhotoPreview() {
      const grid = document.getElementById('photoPreviewGrid'); grid.innerHTML = '';
      editingPhotos.forEach((p, i) => {
        const item = document.createElement('div'); item.className = 'photo-preview-item';
        item.innerHTML = `<img src="${p}"><button class="del-photo" data-idx="${i}">✕</button>`;
        item.querySelector('.del-photo').addEventListener('click', (e) => { e.stopPropagation(); editingPhotos.splice(parseInt(e.target.dataset.idx), 1); renderPhotoPreview(); });
        grid.appendChild(item);
      });
    }
    document.getElementById('btnUploadPhoto').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
      input.addEventListener('change', () => {
        const files = Array.from(input.files); let loaded = 0;
        files.forEach(f => {
          if (f.size > 5 * 1024 * 1024) { alert(`${f.name} 超过 5MB，请压缩后再上传`); return; }
          const reader = new FileReader();
          reader.onload = (e) => { editingPhotos.push(e.target.result); loaded++; if (loaded === files.length) renderPhotoPreview(); };
          reader.readAsDataURL(f);
        });
      });
      input.click();
    });
    document.getElementById('modalSave').addEventListener('click', () => {
      const c = cities[editingIdx]; c.name = document.getElementById('modalName').value || c.name;
      c.nameEn = document.getElementById('modalNameEn').value || c.nameEn; c.tag = document.getElementById('modalTag').value || c.tag;
      c.note = document.getElementById('modalNote').value || c.note; c.photos = editingPhotos;
      saveCities(); renderAll(); document.getElementById('editModal').classList.remove('show');
    });
    document.getElementById('modalCancel').addEventListener('click', () => { document.getElementById('editModal').classList.remove('show'); });
    document.getElementById('modalDelete').addEventListener('click', () => {
      if (confirm(`确定删除 ${cities[editingIdx].name}？`)) { cities.splice(editingIdx, 1); saveCities(); renderAll(); document.getElementById('editModal').classList.remove('show'); }
    });
    document.getElementById('btnAddCity').addEventListener('click', () => {
      const name = document.getElementById('inpName').value.trim();
      const lat = parseFloat(document.getElementById('inpLat').value);
      const lng = parseFloat(document.getElementById('inpLng').value);
      if (!name || isNaN(lat) || isNaN(lng)) { alert('请至少填写城市名、纬度、经度'); return; }
      cities.push({ name, nameEn: document.getElementById('inpNameEn').value.trim() || name, tag: document.getElementById('inpTag').value.trim() || '新目的地', lat, lng, note: document.getElementById('inpNote').value.trim() || '待探索...', photos: [] });
      saveCities(); renderAll();
      ['inpName','inpNameEn','inpTag','inpLat','inpLng','inpNote'].forEach(id => document.getElementById(id).value = '');
      const nc = cities[cities.length - 1]; map.flyTo([nc.lat, nc.lng], 11, { duration: 1.2 });
    });
    document.getElementById('btnPoster').addEventListener('click', generatePoster);
    function generatePoster() {
      const W = 800, H = 1200; const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#EDE9E6'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#D5CFCA'; ctx.fillRect(60, 50, W - 120, 1);
      ctx.fillStyle = '#5B5653'; ctx.font = '400 48px Georgia, serif'; ctx.textAlign = 'center';
      ctx.fillText('✧ 旅行足迹', W / 2, 130);
      ctx.fillStyle = '#8B827B'; ctx.font = 'italic 16px Georgia, serif'; ctx.fillText('acer 的脚步', W / 2, 165);
      ctx.fillStyle = '#D5CFCA'; ctx.fillRect(200, 190, W - 400, 1);
      const total = cities.length; const provinces = new Set(cities.map(c => PROVINCE_MAP[c.name] || c.name));
      const totalPhotos = cities.reduce((s, c) => s + (c.photos ? c.photos.length : 0), 0);
      let north = cities[0], south = cities[0]; cities.forEach(c => { if (c.lat > north.lat) north = c; if (c.lat < south.lat) south = c; });
      ctx.fillStyle = '#5B5653'; ctx.font = '400 36px Georgia, serif';
      ctx.fillText(`${total}`, 160, 255); ctx.fillText(`${provinces.size}`, 340, 255); ctx.fillText(`${totalPhotos}`, 520, 255); ctx.fillText(`${north.name}`, 700, 255);
      ctx.fillStyle = '#9B9088'; ctx.font = '12px Georgia, serif';
      ctx.fillText('城 市', 160, 280); ctx.fillText('省', 340, 280); ctx.fillText('照 片', 520, 280); ctx.fillText('最 北', 700, 280);
      ctx.fillStyle = '#D5CFCA'; ctx.fillRect(60, 300, W - 120, 1);
      ctx.fillStyle = '#5B5653'; ctx.font = '400 18px Georgia, serif'; ctx.textAlign = 'left';
      ctx.fillText('· 到 过 的 地 方', 70, 345);
      let y = 380;
      cities.forEach((c) => {
        if (y > H - 80) return;
        ctx.fillStyle = '#9B8E86'; ctx.beginPath(); ctx.arc(85, y - 2, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#5B5653'; ctx.font = '400 20px Georgia, serif'; ctx.fillText(c.name, 105, y + 4);
        ctx.fillStyle = '#A69D96'; ctx.font = 'italic 12px Georgia, serif'; ctx.fillText(c.nameEn, 105 + ctx.measureText(c.name).width + 15, y + 4);
        ctx.fillStyle = '#8B827B'; ctx.font = '12px Georgia, serif'; ctx.fillText(c.tag, 105, y + 24);
        ctx.fillStyle = '#6B6560'; ctx.font = '13px Georgia, serif'; ctx.fillText(c.note, 105, y + 46);
        y += 72;
      });
      ctx.fillStyle = '#D5CFCA'; ctx.fillRect(60, H - 70, W - 120, 1);
      ctx.fillStyle = '#9B9088'; ctx.font = 'italic 12px Georgia, serif'; ctx.textAlign = 'center';
      ctx.fillText('made with ✦', W / 2, H - 40);
      canvas.toBlob(blob => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'travel-poster.png'; a.click(); });
    }
    loadCities(); initMap(); renderAll();
  </script>
